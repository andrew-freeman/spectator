<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Spectator{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/htmx.min.js" defer></script>
  </head>
  <body class="min-h-full font-sans text-slate-900">
    <div class="bg-slate-900 text-white shadow-md">
      <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
        <div>
          <p class="text-sm uppercase tracking-widest text-slate-400">Spectator</p>
          <h1 class="text-2xl font-semibold">Cognitive Control Center</h1>
        </div>
        <nav class="space-x-4 text-sm">
          <a href="/" class="hover:text-blue-300 transition">Dashboard</a>
          <a href="https://github.com/" class="hover:text-blue-300 transition" target="_blank" rel="noreferrer">Docs</a>
        </nav>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 py-10">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
